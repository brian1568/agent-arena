<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Snake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <div class="header">
      <h1>SNAKE</h1>
      <div class="score">Score: <span id="score-val">0</span></div>
    </div>
    
    <div class="canvas-wrapper">
      <canvas id="game-canvas" width="400" height="400"></canvas>
      <div id="game-over-screen" class="overlay hidden">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Play Again</button>
      </div>
      <div id="pause-screen" class="overlay hidden">
        <h2>Paused</h2>
        <p>Press Space to Resume</p>
      </div>
    </div>
    
    <div class="controls-hint">
      <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move.</p>
      <p>Press <strong>Space</strong> to pause/resume.</p>
      <div style="margin-top: 15px;">
        <button id="ai-toggle-btn" class="ai-btn">Toggle AI Mode (Off)</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
